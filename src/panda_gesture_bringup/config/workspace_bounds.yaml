gesture_tracker:
  ros__parameters:
    camera_id: 0
    smoothing_factor: 0.4
    pinch_threshold: 0.07
    fist_threshold: 0.10
    publish_rate: 30.0
    # Camera X → Robot Y (sideways), Camera Y → Robot Z (height)
    ws_y_min: -0.3
    ws_y_max: 0.3
    ws_z_min: 0.15
    ws_z_max: 0.65
    ws_x_fixed: 0.4

gesture_bridge:
  ros__parameters:
    servo_publish_rate: 30.0
    velocity_gain: 3.0
    deadzone: 0.01
    max_linear_speed: 0.5
    position_tolerance: 0.005
    ws_y_min: -0.3
    ws_y_max: 0.3
    ws_z_min: 0.15
    ws_z_max: 0.65
    ws_x_fixed: 0.4
    planning_frame: "panda_link0"
    ee_frame: "panda_link8"
    gripper_open_pos: 0.04
    gripper_close_pos: 0.0
